<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <title>Calculadora</title>
</head>
<nav class="">
    <div class="col-4"><a href="index.html" class="btn btn-primary "><i class="bi bi-arrow-left"></i> Regresar </a></div>
</nav>
<body class="mt-3">
    <div class="content col-10 row justify-content-md-center text-center m-auto">
        <h1>Calculadora</h1>
        <input class="col-12 m-auto" type="text" id="panel">
        <div class="content-numbers text-center col-9 row justify-content-between mt-3">
            <button class="btn btn btn-danger" id="ac">AC</button>
            <button class="col-4 btn btn-light" id="one">1</button>
            <button class="col-4 btn btn-light" id="two">2</button>
            <button class="col-4 btn btn-light" id="three">3</button>
            <button class="col-4 btn btn-light" id="four">4</button>
            <button class="col-4 btn btn-light" id="five">5</button>
            <button class="col-4 btn btn-light" id="six">6</button>            
            <button class="col-4 btn btn-light" id="seven">7</button>
            <button class="col-4 btn btn-light" id="eight">8</button>
            <button class="col-4 btn btn-light" id="nine">9</button>
            <button class="col-4 btn btn-primary" id="dot">.</button>
            <button class="col-4 btn btn-light" id="zero">0</button>               
            <button class="col-4 btn btn-primary" id="equal">=</button>
        </div>
        <div class="content-operators text-center col-3 m-auto">
            <button class="col-12 btn btn-warning" id="multiplication">*</button>
            <button class="col-12 btn btn-warning" id="division">/</button>
            <button class="col-12 btn btn-warning" id="plus">+</button>
            <button class="col-12 btn btn-warning" id="minus">-</button>
        </div>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
