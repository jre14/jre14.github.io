<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <title>Quiz</title>
</head>
<body class="container bg-info bg-opacity-80 text-white text-center mt-3">
    <nav class="d-flex justify-content-between text-white">
        <div class="col-4"><a href="index.html" class="btn btn-primary "><i class="bi bi-arrow-left"></i> Regresar </a></div>
        <div class="col-4"><h1>¿Quiz?</h1></div>
        <div class="col-4"><h3>0:00</h3></div>
    </nav>
    
    <h1 id="welcome"></h1>
    <div class="container col-10" id="form">
            <h2>Ingresa nombre o apodo:</h2>
            <input type="text" class="form-control" id="name">
            <button class="m-2 btn btn-light" id="start">Comenzar</button>
    </div>

    <div id="category">  
        <button class="btn btn-light" id="generalCulture">Cultura General</button> 
        <button class="btn btn-light" id="futbol">Futbol</button>
    </div>

    <div class="" id="qGC">
        <h2 id="question"></h2>
        <button class="btn btn-light" id="option1"></button>
        <button class="btn btn-light" id="option2"></button>
        <button class="btn btn-light" id="option3"></button>
        <button class="btn btn-light" id="option4"></button>
        <button class="btn btn-light" id="option5"></button>
        
    </div>
    <div id="results">
        <table class="container" id="tRanking">
            <tr>
                <th>Ranking</th>
                <th>Nombre del jugador</th>
                <th>Aciertos</th>
            </tr>
        </table>
    </div>
    <div>
        <h1 class="m-1"id="message"></h1>
    </div>
    <div class="d-flex justify-content-end">
        <button class=" btn btn-light" id="next">Siguiente</button>
    </div>
    <div class="d-flex justify-content-center">
        <button class="btn btn-light" id="btnresults">Ver Resultados</button>
    </div>
    <script src="quiz.js"></script>
</body>
</html>
